<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fernbedienung Susanne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-950: #0a0f1e;
      --navy-900: #0d1526;
      --navy-800: #162040;
      --navy-700: #1e2f5a;
      --gold-400: #d4a843;
      --gold-300: #e8c068;
      --gold-100: rgba(212,168,67,.12);
      --cyan-400: #00d4ff;
      --cyan-100: rgba(0,212,255,.08);
      --white:    #ffffff;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --danger:   #f87171;
      --radius:   10px;
      --radius-sm: 6px;
      --transition: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      background: var(--navy-950);
      color: var(--gray-300);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      padding: 2.5rem clamp(1.25rem, 5vw, 3rem);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.5rem;
      margin-bottom: 3rem;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .header__icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--gold-100);
      border: 1px solid rgba(212,168,67,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header__icon svg {
      width: 18px; height: 18px;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--gold-400);
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.78rem;
      color: var(--gray-400);
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 0.15rem;
    }

    /* ── Status dot ── */
    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--gray-400);
      font-family: 'IBM Plex Mono', monospace;
    }

    .status-dot::before {
      content: '';
      display: block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--cyan-400);
      box-shadow: 0 0 6px var(--cyan-400);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Groups ── */
    .groups {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 900px;
    }

    .group {
      background: var(--navy-900);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color var(--transition);
    }

    .group:hover {
      border-color: rgba(212,168,67,.2);
    }

    .group-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gold-400);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212,168,67,.15);
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ── Buttons ── */
    button {
      background: var(--navy-800);
      color: var(--gray-300);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius-sm);
      padding: 0.55rem 1.1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--gold-400);
      color: var(--gold-400);
      background: var(--gold-100);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(212,168,67,.15);
    }

    button:active {
      transform: scale(0.97) translateY(0);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.success {
      border-color: var(--cyan-400);
      color: var(--cyan-400);
      background: var(--cyan-100);
    }

    button.error {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(248,113,113,.1);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      background: var(--navy-800);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-sm);
      padding: 0.65rem 1.1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--gray-400);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      max-width: 280px;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.ok  {
      color: var(--cyan-400);
      border-color: rgba(0,212,255,.3);
      box-shadow: 0 8px 24px rgba(0,212,255,.1);
    }

    #toast.err {
      color: var(--danger);
      border-color: rgba(248,113,113,.3);
      box-shadow: 0 8px 24px rgba(248,113,113,.1);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem; }
      .button-grid button { flex: 1; min-width: 120px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header__icon">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="7.5" stroke="#d4a843" stroke-width="1.5"/>
        <circle cx="9" cy="9" r="2.5" fill="#d4a843"/>
        <line x1="9" y1="1.5" x2="9" y2="4.5" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="13.5" x2="9" y2="16.5" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1.5" y1="9" x2="4.5" y2="9" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="13.5" y1="9" x2="16.5" y2="9" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1>Fernbedienung Susanne</h1>
      <p>local control panel</p>
    </div>
    <div class="status-dot">connected</div>
  </header>

  <div class="groups">
    {% set ns = namespace(offset=0) %}
    {% for group, buttons in groups.items() %}
    <div class="group">
      <div class="group-label">{{ group }}</div>
      <div class="button-grid">
        {% for btn in buttons %}
        <button
          data-index="{{ loop.index0 + ns.offset }}"
          onclick="trigger(this)">
          {{ btn.label }}
        </button>
        {% endfor %}
      </div>
    </div>
    {% set ns.offset = ns.offset + buttons|length %}
    {% endfor %}
  </div>

  <div id="toast"></div>

  <script>
    document.querySelectorAll('button[data-index]').forEach((btn, i) => {
      btn.dataset.index = i;
    });

    async function trigger(btn) {
      const index = btn.dataset.index;
      btn.disabled = true;

      try {
        const res = await fetch(`/trigger/${index}`, { method: 'POST' });
        const data = await res.json();

        if (res.ok) {
          flash(btn, 'success');
          showToast(`✓ ${data.button}`, 'ok');
        } else {
          flash(btn, 'error');
          showToast(`✗ ${data.detail}`, 'err');
        }
      } catch (e) {
        flash(btn, 'error');
        showToast('✗ Verbindungsfehler', 'err');
      } finally {
        btn.disabled = false;
      }
    }

    function flash(btn, cls) {
      btn.classList.add(cls);
      setTimeout(() => btn.classList.remove(cls), 1400);
    }

    let toastTimer;
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = '', 2500);
    }
  </script>
</body>
</html>
